<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MM2 Inventory Tracker | Premium Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        /* Color Palette & Base Setup */
        :root {
            --bg-dark: #0a0a0c;
            --bg-panel: #141518;
            --bg-hover: #1f2025;
            --accent-red: #ff3b3b;
            --accent-glow: rgba(255, 59, 59, 0.4);
            --text-main: #f0f0f0;
            --text-muted: #8b8d96;
            --border-color: #2a2b33;
            --owned-green: #00ff7f;
            --owned-glow: rgba(0, 255, 127, 0.2);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Header Styling */
        header {
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border-color);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        header h1 span {
            color: var(--accent-red);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        /* Main Layout */
        .app-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar (Categories & Boxes) */
        .sidebar {
            width: 320px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .category-container {
            margin-bottom: 10px;
        }

        .category-header {
            background-color: #101114;
            color: var(--text-muted);
            padding: 12px 25px;
            font-size: 13px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1.5px;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .box-btn {
            background: transparent;
            color: var(--text-main);
            border: none;
            width: 100%;
            text-align: left;
            padding: 15px 25px;
            font-size: 15px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .box-btn:hover {
            background-color: var(--bg-hover);
            padding-left: 30px;
            color: var(--accent-red);
        }

        .box-btn.active {
            background-color: var(--bg-hover);
            color: var(--accent-red);
            font-weight: 500;
            border-left: 4px solid var(--accent-red);
            padding-left: 21px;
        }

        /* Custom Scrollbar for Sidebar */
        .sidebar::-webkit-scrollbar {
            width: 8px;
        }
        .sidebar::-webkit-scrollbar-track {
            background: var(--bg-panel);
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        /* Main Content Area (Guns) */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background: radial-gradient(circle at top left, #121318 0%, var(--bg-dark) 100%);
        }

        .box-title {
            font-size: 28px;
            margin-top: 0;
            margin-bottom: 30px;
            font-weight: 700;
            color: #fff;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
        }

        /* Grid Layout for Guns */
        .gun-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .gun-card {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            cursor: pointer;
        }

        .gun-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            border-color: #3f4150;
        }

        .gun-card.owned {
            border-color: var(--owned-green);
            background: linear-gradient(145deg, var(--bg-panel) 0%, #0d1f15 100%);
            box-shadow: 0 4px 15px var(--owned-glow);
        }

        .gun-info {
            display: flex;
            flex-direction: column;
            pointer-events: none; /* Let the card handle the click */
        }

        .gun-name {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .gun-status {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .gun-card.owned .gun-status {
            color: var(--owned-green);
        }

        /* Custom Checkbox Design */
        .checkbox-wrapper {
            position: relative;
            width: 28px;
            height: 28px;
            pointer-events: none;
        }

        .gun-card input[type="checkbox"] {
            display: none;
        }

        .custom-checkbox {
            position: absolute;
            top: 0;
            left: 0;
            height: 28px;
            width: 28px;
            background-color: var(--bg-dark);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .gun-card:hover .custom-checkbox {
            border-color: var(--text-muted);
        }

        .gun-card.owned .custom-checkbox {
            background-color: var(--owned-green);
            border-color: var(--owned-green);
            box-shadow: 0 0 10px var(--owned-glow);
        }

        /* Checkmark Icon */
        .custom-checkbox::after {
            content: "";
            position: absolute;
            display: none;
            left: 9px;
            top: 4px;
            width: 6px;
            height: 12px;
            border: solid var(--bg-dark);
            border-width: 0 3px 3px 0;
            transform: rotate(45deg);
        }

        .gun-card.owned .custom-checkbox::after {
            display: block;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            color: var(--text-muted);
            margin-top: 100px;
        }

        .empty-state h2 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #fff;
        }

    </style>
</head>
<body>

    <header>
        <h1>MM2 <span>Tracker</span></h1>
        <div style="font-size: 14px; color: var(--text-muted);">Inventory saves automatically</div>
    </header>

    <div class="app-container">
        <!-- Sidebar dynamically populated by JS -->
        <div class="sidebar" id="sidebar">
            <!-- Categories will go here -->
        </div>

        <!-- Main content area -->
        <div class="main-content">
            <div id="content-area">
                <div class="empty-state">
                    <h2>Welcome to your Inventory</h2>
                    <p>Select a box from the sidebar to start tracking your collection.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. Expanded Data Structure categorized
        const mm2Database = {
            "Classic Boxes": {
                "Gun Box 1": ["Luger", "Shark", "Laser", "Corrupt"],
                "Gun Box 2": ["Fang", "Deathshard", "Clockwork"],
                "Gun Box 3": ["Blaster", "Virtual"],
                "Knife Box 1": ["Slasher", "Tides"],
                "Knife Box 2": ["Heat", "Chill"],
                "Knife Box 3": ["Saw", "Handsaw"],
                "Knife Box 4": ["Pixel", "Spider"],
                "Knife Box 5": ["Minty", "Logchopper"]
            },
            "Season 1": {
                "Mystery Box 1": ["Gemstone", "Lightbringer", "Darkbringer", "Bioblade"],
                "Mystery Box 2": ["Prismatic", "Nightblade", "Ice Dragon", "Frostbite"]
            },
            "Halloween Event": {
                "Halloween 2018 Box": ["Batwing", "Spider"],
                "Halloween 2019 Box": ["Hallowscythe", "Hallowgun"],
                "Halloween 2020 Box": ["Elderwood Scythe", "Elderwood Revolver"],
                "Halloween 2021 Box": ["Harvester", "Candleflame"]
            },
            "Christmas Event": {
                "Christmas 2018 Box": ["Candy", "Sugar"],
                "Christmas 2019 Box": ["Icebreaker", "Iceblaster"],
                "Christmas 2020 Box": ["Logchopper", "Minty"],
                "Christmas 2021 Box": ["Icewing", "Snowman"]
            }
        };

        // 2. State Management
        let inventory = JSON.parse(localStorage.getItem('mm2PremiumInventory')) || {};
        let currentActiveButton = null;

        const sidebar = document.getElementById('sidebar');
        const contentArea = document.getElementById('content-area');

        // 3. Initialize the Sidebar with Categories
        function renderSidebar() {
            Object.keys(mm2Database).forEach(categoryName => {
                
                // Create Category Wrapper
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'category-container';

                // Create Category Header
                const categoryHeader = document.createElement('div');
                categoryHeader.className = 'category-header';
                categoryHeader.textContent = categoryName;
                categoryDiv.appendChild(categoryHeader);

                // Create Buttons for each box in this category
                const boxes = mm2Database[categoryName];
                Object.keys(boxes).forEach(boxName => {
                    const btn = document.createElement('button');
                    btn.className = 'box-btn';
                    btn.textContent = boxName;
                    
                    btn.onclick = () => {
                        // Handle active state styling
                        if (currentActiveButton) {
                            currentActiveButton.classList.remove('active');
                        }
                        btn.classList.add('active');
                        currentActiveButton = btn;

                        // Show the guns
                        renderGuns(boxName, boxes[boxName]);
                    };
                    
                    categoryDiv.appendChild(btn);
                });

                sidebar.appendChild(categoryDiv);
            });
        }

        // 4. Render the Guns for a selected Box
        function renderGuns(boxName, gunsArray) {
            // Clear content and set the title
            contentArea.innerHTML = `<h2 class="box-title">${boxName}</h2>`;
            
            // Create the grid container
            const grid = document.createElement('div');
            grid.className = 'gun-grid';

            gunsArray.forEach(gun => {
                const card = document.createElement('div');
                card.className = 'gun-card';
                
                const isOwned = inventory[gun] === true;
                if (isOwned) {
                    card.classList.add('owned');
                }

                // Internal HTML structure for the card
                card.innerHTML = `
                    <div class="gun-info">
                        <span class="gun-name">${gun}</span>
                        <span class="gun-status">${isOwned ? 'Owned' : 'Not Owned'}</span>
                    </div>
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="${gun}" ${isOwned ? 'checked' : ''}>
                        <span class="custom-checkbox"></span>
                    </div>
                `;

                // Handle clicking anywhere on the card
                card.addEventListener('click', () => {
                    const checkbox = card.querySelector('input[type="checkbox"]');
                    const statusText = card.querySelector('.gun-status');
                    
                    // Toggle state
                    const newState = !checkbox.checked;
                    checkbox.checked = newState;
                    inventory[gun] = newState;
                    
                    // Save to LocalStorage
                    localStorage.setItem('mm2PremiumInventory', JSON.stringify(inventory));
                    
                    // Update UI visually
                    if (newState) {
                        card.classList.add('owned');
                        statusText.textContent = 'Owned';
                    } else {
                        card.classList.remove('owned');
                        statusText.textContent = 'Not Owned';
                    }
                });

                grid.appendChild(card);
            });

            contentArea.appendChild(grid);
        }

        // 5. Run setup on load
        renderSidebar();

    </script>
</body>
</html>
