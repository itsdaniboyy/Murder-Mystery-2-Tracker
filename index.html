<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MM2 Inventory Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --bg-panel: #141518;
            --bg-hover: #1f2025;
            --accent-red: #ff3b3b;
            --accent-glow: rgba(255, 59, 59, 0.4);
            --text-main: #f0f0f0;
            --text-muted: #8b8d96;
            --border-color: #2a2b33;
            --owned-green: #00ff7f;
            --owned-glow: rgba(0, 255, 127, 0.2);
            --img-bg: #1e1e24;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        
        header {
            background-color: var(--bg-panel);
            border-bottom: 1px solid var(--border-color);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        header h1 span {
            color: var(--accent-red);
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .app-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 320px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .category-container {
            margin-bottom: 10px;
        }

        .category-header {
            background-color: #101114;
            color: var(--text-muted);
            padding: 12px 25px;
            font-size: 13px;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1.5px;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }

        .box-btn {
            background: transparent;
            color: var(--text-main);
            border: none;
            width: 100%;
            text-align: left;
            padding: 15px 25px;
            font-size: 15px;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
        }

        .box-btn:hover {
            background-color: var(--bg-hover);
            padding-left: 30px;
            color: var(--accent-red);
        }

        .box-btn.active {
            background-color: var(--bg-hover);
            color: var(--accent-red);
            font-weight: 500;
            border-left: 4px solid var(--accent-red);
            padding-left: 21px;
        }

        .sidebar::-webkit-scrollbar, .main-content::-webkit-scrollbar {
            width: 8px;
        }
        .sidebar::-webkit-scrollbar-track, .main-content::-webkit-scrollbar-track {
            background: var(--bg-panel);
        }
        .sidebar::-webkit-scrollbar-thumb, .main-content::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }

        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background: radial-gradient(circle at top left, #121318 0%, var(--bg-dark) 100%);
        }

        .box-title {
            font-size: 28px;
            margin-top: 0;
            margin-bottom: 30px;
            font-weight: 700;
            color: #fff;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
        }

        .gun-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .gun-card {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 15px;
            display: flex;
            align-items: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            cursor: pointer;
            gap: 15px;
        }

        .gun-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
            border-color: #3f4150;
        }

        .gun-card.owned {
            border-color: var(--owned-green);
            background: linear-gradient(145deg, var(--bg-panel) 0%, #0d1f15 100%);
            box-shadow: 0 4px 15px var(--owned-glow);
        }

        .gun-image-container {
            width: 70px;
            height: 70px;
            background-color: var(--img-bg);
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border: 1px solid var(--border-color);
        }

        .gun-image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gun-card.owned .gun-image-container {
            border-color: var(--owned-green);
        }

        .gun-info {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            pointer-events: none;
        }

        .gun-name {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 6px;
        }

        .gun-status {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .gun-card.owned .gun-status {
            color: var(--owned-green);
        }

        .checkbox-wrapper {
            position: relative;
            width: 28px;
            height: 28px;
            pointer-events: none;
            flex-shrink: 0;
        }

        .gun-card input[type="checkbox"] {
            display: none;
        }

        .custom-checkbox {
            position: absolute;
            top: 0;
            left: 0;
            height: 28px;
            width: 28px;
            background-color: var(--bg-dark);
            border: 2px solid var(--border-color);
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .gun-card:hover .custom-checkbox {
            border-color: var(--text-muted);
        }

        .gun-card.owned .custom-checkbox {
            background-color: var(--owned-green);
            border-color: var(--owned-green);
            box-shadow: 0 0 10px var(--owned-glow);
        }

        .custom-checkbox::after {
            content: "";
            position: absolute;
            display: none;
            left: 9px;
            top: 4px;
            width: 6px;
            height: 12px;
            border: solid var(--bg-dark);
            border-width: 0 3px 3px 0;
            transform: rotate(45deg);
        }

        .gun-card.owned .custom-checkbox::after {
            display: block;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            margin-top: 100px;
        }

        .empty-state h2 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #fff;
        }

    </style>
</head>
<body>

    <header>
        <h1>MM2 <span>Visual Tracker</span></h1>
        <div style="font-size: 14px; color: var(--text-muted);">Inventory saves automatically!</div>
    </header>

    <div class="app-container">
        <div class="sidebar" id="sidebar"></div>
        <div class="main-content">
            <div id="content-area">
                <div class="empty-state">
                    <h2>Welcome to your Inventory!</h2>
                    <p>Select a box from the sidebar to view your weapons.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const mm2Database = {
            "Season 1": {
                "Mystery Box 1": [
                    /* Common */
                    { name: "Combat", img: "images/Combat.png" },
                    { name: "Shark", img: getPlaceholder("Shark") },
                    { name: "Laser", img: getPlaceholder("Laser") },
                    { name: "Corrupt", img: getPlaceholder("Corrupt") }
                ],
                "Gun Box 2": [
                    { name: "Fang", img: getPlaceholder("Fang") },
                    { name: "Deathshard", img: getPlaceholder("Deathshard") },
                    { name: "Clockwork", img: getPlaceholder("Clockwork") }
                ],
                "Gun Box 3": [
                    { name: "Blaster", img: getPlaceholder("Blaster") },
                    { name: "Virtual", img: getPlaceholder("Virtual") }
                ],
                "Knife Box 1": [
                    { name: "Slasher", img: getPlaceholder("Slasher") },
                    { name: "Tides", img: getPlaceholder("Tides") }
                ],
                "Knife Box 2": [
                    { name: "Heat", img: getPlaceholder("Heat") },
                    { name: "Chill", img: getPlaceholder("Chill") }
                ],
                "Knife Box 3": [
                    { name: "Saw", img: getPlaceholder("Saw") },
                    { name: "Handsaw", img: getPlaceholder("Handsaw") }
                ],
                "Knife Box 4": [
                    { name: "Pixel", img: getPlaceholder("Pixel") },
                    { name: "Spider", img: getPlaceholder("Spider") }
                ],
                "Knife Box 5": [
                    { name: "Minty", img: getPlaceholder("Minty") },
                    { name: "Logchopper", img: getPlaceholder("Logchopper") }
                ]
            },
            "Season 1": {
                "Mystery Box 1": [
                    { name: "Gemstone", img: getPlaceholder("Gemstone") },
                    { name: "Lightbringer", img: getPlaceholder("Lightbringer") },
                    { name: "Darkbringer", img: getPlaceholder("Darkbringer") },
                    { name: "Bioblade", img: getPlaceholder("Bioblade") }
                ],
                "Mystery Box 2": [
                    { name: "Prismatic", img: getPlaceholder("Prismatic") },
                    { name: "Nightblade", img: getPlaceholder("Nightblade") },
                    { name: "Ice Dragon", img: getPlaceholder("Ice Dragon") },
                    { name: "Frostbite", img: getPlaceholder("Frostbite") }
                ]
            },
            "Halloween Event": {
                "Halloween 2018 Box": [
                    { name: "Batwing", img: getPlaceholder("Batwing") },
                    { name: "Spider", img: getPlaceholder("Spider") }
                ],
                "Halloween 2019 Box": [
                    { name: "Hallowscythe", img: getPlaceholder("Hallowscythe") },
                    { name: "Hallowgun", img: getPlaceholder("Hallowgun") }
                ],
                "Halloween 2020 Box": [
                    { name: "Elderwood Scythe", img: getPlaceholder("EW Scythe") },
                    { name: "Elderwood Revolver", img: getPlaceholder("EW Revolver") }
                ],
                "Halloween 2021 Box": [
                    { name: "Harvester", img: getPlaceholder("Harvester") },
                    { name: "Candleflame", img: getPlaceholder("Candleflame") }
                ]
            },
            "Christmas Event": {
                "Christmas 2018 Box": [
                    { name: "Candy", img: getPlaceholder("Candy") },
                    { name: "Sugar", img: getPlaceholder("Sugar") }
                ],
                "Christmas 2019 Box": [
                    { name: "Icebreaker", img: getPlaceholder("Icebreaker") },
                    { name: "Iceblaster", img: getPlaceholder("Iceblaster") }
                ],
                "Christmas 2020 Box": [
                    { name: "Logchopper", img: getPlaceholder("Logchopper") },
                    { name: "Minty", img: getPlaceholder("Minty") }
                ],
                "Christmas 2021 Box": [
                    { name: "Icewing", img: getPlaceholder("Icewing") },
                    { name: "Snowman", img: getPlaceholder("Snowman") }
                ]
            }
        };

        // 2. State Management
        let inventory = JSON.parse(localStorage.getItem('mm2VisualInventory')) || {};
        let currentActiveButton = null;

        const sidebar = document.getElementById('sidebar');
        const contentArea = document.getElementById('content-area');

        // 3. Initialize the Sidebar
        function renderSidebar() {
            Object.keys(mm2Database).forEach(categoryName => {
                
                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'category-container';

                const categoryHeader = document.createElement('div');
                categoryHeader.className = 'category-header';
                categoryHeader.textContent = categoryName;
                categoryDiv.appendChild(categoryHeader);

                const boxes = mm2Database[categoryName];
                Object.keys(boxes).forEach(boxName => {
                    const btn = document.createElement('button');
                    btn.className = 'box-btn';
                    btn.textContent = boxName;
                    
                    btn.onclick = () => {
                        if (currentActiveButton) {
                            currentActiveButton.classList.remove('active');
                        }
                        btn.classList.add('active');
                        currentActiveButton = btn;

                        renderGuns(boxName, boxes[boxName]);
                    };
                    
                    categoryDiv.appendChild(btn);
                });

                sidebar.appendChild(categoryDiv);
            });
        }

        // 4. Render the Guns for a selected Box with Images
        function renderGuns(boxName, gunsArray) {
            contentArea.innerHTML = `<h2 class="box-title">${boxName}</h2>`;
            
            const grid = document.createElement('div');
            grid.className = 'gun-grid';

            gunsArray.forEach(item => {
                const gun = item.name;
                const imgSrc = item.img;
                
                const card = document.createElement('div');
                card.className = 'gun-card';
                
                const isOwned = inventory[gun] === true;
                if (isOwned) {
                    card.classList.add('owned');
                }

                card.innerHTML = `
                    <div class="gun-image-container">
                        <img src="${imgSrc}" alt="${gun}" loading="lazy">
                    </div>
                    <div class="gun-info">
                        <span class="gun-name">${gun}</span>
                        <span class="gun-status">${isOwned ? 'Owned' : 'Not Owned'}</span>
                    </div>
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="${gun}" ${isOwned ? 'checked' : ''}>
                        <span class="custom-checkbox"></span>
                    </div>
                `;

                card.addEventListener('click', () => {
                    const checkbox = card.querySelector('input[type="checkbox"]');
                    const statusText = card.querySelector('.gun-status');
                    
                    const newState = !checkbox.checked;
                    checkbox.checked = newState;
                    inventory[gun] = newState;
                    
                    localStorage.setItem('mm2VisualInventory', JSON.stringify(inventory));
                    
                    if (newState) {
                        card.classList.add('owned');
                        statusText.textContent = 'Owned';
                    } else {
                        card.classList.remove('owned');
                        statusText.textContent = 'Not Owned';
                    }
                });

                grid.appendChild(card);
            });

            contentArea.appendChild(grid);
        }

        // 5. Run setup on load
        renderSidebar();

    </script>
</body>
</html>
