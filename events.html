<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineVault Ultra - Events & Battlepasses</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Roboto:wght@400;700&display=swap');

        :root {
            --bg-main: #0b0c10;
            --bg-sidebar: #1f2833;
            --bg-card: #151a22;
            --accent-red: #c5c6c7;
            --text-main: #ffffff;
            --text-muted: #8b929a;
            --halloween-color: #ff7518;
            --christmas-color: #00cc66;
            --summer-color: #ffd700;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* TABS (Caixas vs Battlepasses) */
        .type-tabs {
            display: flex;
            background-color: #11151c;
            border-bottom: 2px solid #333;
            padding: 10px 20px 0 20px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.2em;
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            padding: 10px 20px;
            cursor: pointer;
            transition: 0.3s ease;
            border-bottom: 3px solid transparent;
        }

        .tab-btn:hover {
            color: var(--text-main);
        }

        .tab-btn.active {
            color: var(--text-main);
            border-bottom: 3px solid #00bfff;
        }

        /* Sidebar Container */
        .sidebar-container {
            width: 320px;
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            border-right: 1px solid #2a3441;
        }

        .sidebar-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 15px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-main); }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #666; }

        /* Categorias na Sidebar */
        .category-group {
            margin-bottom: 20px;
        }

        .category-header {
            font-family: 'Oswald', sans-serif;
            font-size: 1.3em;
            text-transform: uppercase;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 2px solid;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-halloween { color: var(--halloween-color); border-color: var(--halloween-color); }
        .header-christmas { color: var(--christmas-color); border-color: var(--christmas-color); }
        .header-summer { color: var(--summer-color); border-color: var(--summer-color); }

        .item-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .list-item {
            padding: 10px 12px;
            margin-bottom: 5px;
            background-color: rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            cursor: pointer;
            font-weight: 700;
            color: #ccc;
            transition: all 0.2s;
            border-left: 3px solid transparent;
        }

        .list-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: #fff;
            transform: translateX(5px);
        }

        .list-item.active {
            background-color: rgba(0, 191, 255, 0.1);
            color: #00bfff;
            border-left: 3px solid #00bfff;
        }

        /* Main Content */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .content-header {
            padding: 20px 40px;
            background: linear-gradient(to bottom, #1a202c, var(--bg-main));
            border-bottom: 1px solid #2a3441;
        }

        .content-title {
            font-family: 'Oswald', sans-serif;
            font-size: 2.5em;
            margin: 0;
            color: #fff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .items-grid-container {
            flex-grow: 1;
            padding: 30px 40px;
            overflow-y: auto;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
        }

        /* Cartões de Item */
        .item-card {
            background-color: var(--bg-card);
            border: 1px solid #2a3441;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .item-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0, 0, 0, 0.5);
            border-color: #444;
        }

        .item-card img {
            width: 100%;
            height: 120px;
            object-fit: contain;
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
        }

        .item-name {
            font-weight: bold;
            font-size: 1.1em;
            color: #e0e0e0;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            font-size: 1.2em;
            margin-top: 50px;
            grid-column: 1 / -1;
        }
    </style>
</head>

let currentViewType = 'boxes';
let activeItemElement = null;

function switchType(type) {
    currentViewType = type;
    
    // Atualiza classes das tabs
    const tabs = document.querySelectorAll('.tab-btn');
    tabs[0].classList.toggle('active', type === 'boxes');
    tabs[1].classList.toggle('active', type === 'battlepasses');

    // Limpa o conteúdo principal
    document.getElementById('content-title').textContent = "Seleciona um Evento";
    document.getElementById('items-grid').innerHTML = '<div class="empty-state">Escolhe uma opção no menu lateral.</div>';
    
    renderSidebar();
}

function renderSidebar() {
    const sidebar = document.getElementById('sidebar-content');
    sidebar.innerHTML = '';

    const currentData = database[currentViewType];

    // Ordem desejada das categorias
    const categories = [
        { key: 'Halloween', icon: '🎃', cssClass: 'header-halloween' },
        { key: 'Christmas', icon: '🎄', cssClass: 'header-christmas' },
        { key: 'Summer', icon: '☀️', cssClass: 'header-summer' }
    ];

    categories.forEach(cat => {
        if (!currentData[cat.key]) return;

        // Container da Categoria
        const groupDiv = document.createElement('div');
        groupDiv.className = 'category-group';

        // Cabeçalho da Categoria
        const header = document.createElement('div');
        header.className = `category-header ${cat.cssClass}`;
        header.innerHTML = `<span>${cat.icon}</span> ${cat.key}`;
        groupDiv.appendChild(header);

        // Lista de itens (Caixas ou Passes)
        const ul = document.createElement('ul');
        ul.className = 'item-list';

        const itemsObj = currentData[cat.key];
        for (const itemName in itemsObj) {
            const li = document.createElement('li');
            li.className = 'list-item';
            li.textContent = itemName;
            
            li.onclick = (e) => {
                // Atualiza seleção visual no menu
                if (activeItemElement) {
                    activeItemElement.classList.remove('active');
                }
                li.classList.add('active');
                activeItemElement = li;

                renderItems(itemName, itemsObj[itemName]);
            };
            
            ul.appendChild(li);
        }

        groupDiv.appendChild(ul);
        sidebar.appendChild(groupDiv);
    });
}

function renderItems(title, itemsArray) {
    const titleEl = document.getElementById('content-title');
    const grid = document.getElementById('items-grid');
    
    titleEl.textContent = title;
    grid.innerHTML = '';

    if (!itemsArray || itemsArray.length === 0) {
        grid.innerHTML = '<div class="empty-state">Esta caixa está vazia. Adiciona itens no código.</div>';
        return;
    }

    itemsArray.forEach(item => {
        const card = document.createElement('div');
        card.className = 'item-card';

        // Imagem principal ou um placeholder garantido caso falhe a carregar
        const imgSrc = item.img && item.img !== "placeholder.png" ? item.img : 'https://via.placeholder.com/150/151a22/8b929a?text=Sem+Imagem';

        card.innerHTML = `
            <img src="${imgSrc}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/150/151a22/8b929a?text=Sem+Imagem'">
            <div class="item-name">${item.name}</div>
        `;
        grid.appendChild(card);
    });
}

// Inicia com "boxes" quando a página carrega
renderSidebar();
