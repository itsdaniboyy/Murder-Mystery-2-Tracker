<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MM2 Tracker - Mystery Boxes</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050508;
            --bg-panel: rgba(20, 21, 24, 0.7);
            --bg-hover: rgba(31, 32, 37, 0.9);
            --accent-red: #ff3b3b;
            --accent-glow: rgba(255, 59, 59, 0.5);
            --text-main: #f0f0f0;
            --text-muted: #6c6e79;
            --border-color: rgba(42, 43, 51, 0.6);
            --owned-green: #00ff7f;
            --owned-glow: rgba(0, 255, 127, 0.3);
            --img-bg: rgba(10, 10, 12, 0.8);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            background: radial-gradient(circle at top left, #120a0a 0%, var(--bg-dark) 100%);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Top Navigation Bar */
        header {
            background: rgba(10, 11, 14, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-color);
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.8);
            z-index: 10;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        .back-btn {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover {
            border-color: var(--accent-red);
            color: var(--accent-red);
            box-shadow: 0 0 15px var(--accent-glow);
            transform: translateX(-3px);
        }

        header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        header h1 span {
            color: var(--accent-red);
            text-shadow: 0 0 15px var(--accent-glow);
        }

        .header-stats {
            font-size: 14px;
            color: var(--text-muted);
            background: rgba(0,0,0,0.3);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
        }

        .app-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* Glass Sidebar */
        .sidebar {
            width: 320px;
            background: rgba(15, 16, 20, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-right: 1px solid var(--border-color);
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            z-index: 5;
            box-shadow: 5px 0 25px rgba(0,0,0,0.5);
        }

        .category-container {
            margin-bottom: 5px;
        }

        .category-header {
            background: linear-gradient(90deg, rgba(20,21,26,1) 0%, rgba(20,21,26,0) 100%);
            color: var(--text-muted);
            padding: 15px 25px;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 900;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255,255,255,0.02);
        }

        .box-btn {
            background: transparent;
            color: var(--text-main);
            border: none;
            width: 100%;
            text-align: left;
            padding: 12px 25px 12px 40px;
            font-size: 14px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .box-btn::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 3px;
            background: var(--accent-red);
            transform: scaleY(0);
            transition: transform 0.3s ease;
        }

        .box-btn:hover {
            background: linear-gradient(90deg, var(--bg-hover) 0%, transparent 100%);
            color: #fff;
            padding-left: 45px;
        }

        .box-btn.active {
            background: linear-gradient(90deg, rgba(255, 59, 59, 0.1) 0%, transparent 100%);
            color: var(--accent-red);
            font-weight: 700;
            padding-left: 45px;
        }

        .box-btn.active::before {
            transform: scaleY(1);
        }

        /* Main Tracking Area */
        .main-content {
            flex: 1;
            padding: 50px;
            overflow-y: auto;
            position: relative;
        }

        .box-title {
            font-size: 32px;
            margin-top: 0;
            margin-bottom: 40px;
            font-weight: 900;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            position: relative;
        }

        .box-title::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 60%;
            height: 3px;
            background: var(--accent-red);
            box-shadow: 0 0 10px var(--accent-glow);
            border-radius: 2px;
        }

        .gun-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        /* 3D Glass Weapon Cards */
        .gun-card {
            background: var(--bg-panel);
            backdrop-filter: blur(8px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 15px;
            display: flex;
            align-items: center;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            gap: 18px;
            position: relative;
            overflow: hidden;
            
            opacity: 0;
            transform: translateY(20px);
            animation: cardEnter 0.5s forwards ease-out;
        }

        @keyframes cardEnter {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .gun-card:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: rgba(255,255,255,0.2);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
            background: rgba(30, 31, 38, 0.8);
        }

        .gun-card.owned {
            border-color: var(--owned-green);
            background: linear-gradient(135deg, rgba(20,21,24,0.9) 0%, rgba(0, 40, 20, 0.6) 100%);
            box-shadow: 0 10px 25px rgba(0, 255, 127, 0.15), inset 0 0 20px rgba(0, 255, 127, 0.05);
        }

        .gun-card.owned:hover {
            box-shadow: 0 15px 35px rgba(0, 255, 127, 0.25), inset 0 0 20px rgba(0, 255, 127, 0.1);
        }

        .gun-image-container {
            width: 75px;
            height: 75px;
            background-color: var(--img-bg);
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }

        .gun-image-container img {
            width: 85%;
            height: 85%;
            object-fit: contain;
            transition: transform 0.4s ease;
        }

        .gun-card:hover .gun-image-container img {
            transform: scale(1.1) rotate(-5deg);
        }

        .gun-card.owned .gun-image-container {
            border-color: rgba(0, 255, 127, 0.4);
            background-color: rgba(0, 20, 10, 0.8);
        }

        .gun-info {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            pointer-events: none;
        }

        .gun-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
            transition: color 0.3s ease;
        }

        .gun-status {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .gun-card.owned .gun-name {
            color: #fff;
        }

        .gun-card.owned .gun-status {
            color: var(--owned-green);
            text-shadow: 0 0 10px var(--owned-glow);
        }

        /* Checkbox wrapper adjustments */
        .checkbox-wrapper {
            position: relative;
            width: 32px;
            height: 32px;
            pointer-events: none;
            flex-shrink: 0;
            margin-right: 5px;
        }

        .gun-card input[type="checkbox"] {
            display: none;
        }

        .custom-checkbox {
            position: absolute;
            top: 0;
            left: 0;
            height: 32px;
            width: 32px;
            background-color: rgba(0,0,0,0.5);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .gun-card:hover .custom-checkbox {
            border-color: rgba(255,255,255,0.4);
        }

        .gun-card.owned .custom-checkbox {
            background-color: var(--owned-green);
            border-color: var(--owned-green);
            box-shadow: 0 0 15px var(--owned-glow);
            transform: scale(1.05);
        }

        .custom-checkbox::after {
            content: "";
            position: absolute;
            display: none;
            left: 11px;
            top: 5px;
            width: 6px;
            height: 14px;
            border: solid var(--bg-dark);
            border-width: 0 3px 3px 0;
            transform: rotate(45deg);
            animation: checkmark 0.3s ease-in-out forwards;
        }

        @keyframes checkmark {
            0% { height: 0; width: 0; opacity: 0; }
            100% { height: 14px; width: 6px; opacity: 1; }
        }

        .gun-card.owned .custom-checkbox::after {
            display: block;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 60vh;
            text-align: center;
            color: var(--text-muted);
            animation: cardEnter 0.6s forwards ease-out;
        }

        .empty-state h2 {
            font-size: 28px;
            color: #fff;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <a href="index.html" class="back-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                Main Menu
            </a>
            <h1>Mystery <span>Boxes</span></h1>
        </div>
        <div class="header-stats" id="global-stats">Loading stats...</div>
    </header>

    <div class="app-container">
        <div class="sidebar" id="sidebar"></div>

        <div class="main-content">
            <div id="content-area">
                <div class="empty-state">
                    <h2>Select a Crate</h2>
                    <p>Choose a classic or seasonal box from the sidebar to start tracking your inventory.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const mm2Database = {
    "Season 1": {
        "Mystery Box 1": [
            { name: "Combat", img: "Combat.png" },
            { name: "Cooper", img: "Cooper.png" },
            { name: "Laser", img: "Laser.png" },
            { name: "Corrupt", img: "Corrupt.png" },
            { name: "Copper", img: "Copper.png" },
            { name: "Hardened", img: "Hardened.png" },
            { name: "Splat", img: "Splat.png" },
            { name: "Camo", img: "Camo.png" },
            { name: "Tiger", img: "Tiger.png" },
            { name: "Pirate", img: "Pirate.png" },
            { name: "Space", img: "Space.png" },
            { name: "Rainbow", img: "Rainbow.png" },
            { name: "Rune", img: "Rune.png" },
            { name: "Gemstone", img: "Gemstone.png" },
            { name: "Chroma Gemstone", img: "Chromagemstone.png" }
        ],
        "Mystery Box 2": [
            { name: "Clown", img: "Clown.png" },
            { name: "Shaded", img: "Shaded.png" },
            { name: "Lovely", img: "Lovely.png" },
            { name: "Leaf", img: "Leaf.png" },
            { name: "Biogun", img: "Biogun.png" },
            { name: "Graffiti", img: "Graffiti.png" },
            { name: "High Tech", img: "HighTech.png" },
            { name: "Nightfire", img: "Nightfire.png" },
            { name: "Deep Sea", img: "DeepSea.png" },
            { name: "Splash", img: "Splash.png" },
            { name: "Lightbringer", img: "Lightbringer.png" },
            { name: "Darkbringer", img: "Darkbringer.png" },
            { name: "Chroma Lightbringer", img: "ChromaLightbringer.png" },
            { name: "Chroma Darkbringer", img: "ChromaDarkbringer.png" }
        ]
    },
    "Classic Boxes": {
        "Gun Box 3": [
            { name: "Laser", img: "Laser.png" },
            { name: "Fade", img: "Fade.png" },
            { name: "Blue", img: "Blue.png" }
        ],
        "Gun Box 4": [
            { name: "Blaster", img: "Blaster.png" },
            { name: "High Tech", img: "High_Tech.png" }
        ],
        "Gun Box 5": [
            { name: "Virtual", img: "Virtual.png" },
            { name: "Adurite", img: "Adurite.png" }
        ],
        "Knife Box 1": [
            { name: "Deathshard", img: "Deathshard.png" },
            { name: "Elite", img: "Elite.png" },
            { name: "Imbued", img: "Imbued.png" }
        ],
        "Knife Box 2": [
            { name: "Fang", img: "Fang.png" },
            { name: "Rune", img: "Rune.png" },
            { name: "Green Marble", img: "Green_Marble.png" }
        ],
        "Knife Box 3": [
            { name: "Saw", img: "Saw.png" },
            { name: "Fusion", img: "Fusion.png" }
        ],
        "Knife Box 4": [
            { name: "Slasher", img: "Slasher.png" },
            { name: "Shadow", img: "Shadow.png" }
        ],
        "Knife Box 5": [
            { name: "Tides", img: "Tides.png" },
            { name: "Vaporwave", img: "Vaporwave.png" }
        ],
        "Mystery Box 1": [
            { name: "Amerilaser", img: "Amerilaser.png" },
            { name: "Old Glory", img: "Old_Glory.png" },
            { name: "Clockwork", img: "Clockwork.png" }
        ],
        "Mystery Box 2": [
            { name: "Pixel", img: "Pixel.png" },
            { name: "Spider", img: "Spider.png" }
        ]
    }
};

        let inventory = JSON.parse(localStorage.getItem('mm2VisualInventory')) || {};
        let currentActiveButton = null;

        const sidebar = document.getElementById('sidebar');
        const contentArea = document.getElementById('content-area');
        const statsDisplay = document.getElementById('global-stats');

        const categoriesForThisPage = ["Classic Boxes", "Season 1"]; 

        function updateGlobalStats() {
            let totalItems = 0;
            let ownedItems = 0;
            
            categoriesForThisPage.forEach(cat => {
                if (mm2Database[cat]) {
                    Object.values(mm2Database[cat]).forEach(box => {
                        totalItems += box.length;
                        box.forEach(gun => {
                            if (inventory[gun.name]) ownedItems++;
                        });
                    });
                }
            });

            const percent = totalItems === 0 ? 0 : Math.round((ownedItems / totalItems) * 100);
            statsDisplay.innerHTML = `Box Completion: <strong style="color: #fff;">${ownedItems}/${totalItems}</strong> <span style="color: var(--accent-red);">(${percent}%)</span>`;
        }

        function renderSidebar() {
            categoriesForThisPage.forEach(categoryName => {
                if (!mm2Database[categoryName]) return;

                const categoryDiv = document.createElement('div');
                categoryDiv.className = 'category-container';

                const categoryHeader = document.createElement('div');
                categoryHeader.className = 'category-header';
                categoryHeader.textContent = categoryName;
                categoryDiv.appendChild(categoryHeader);

                const boxes = mm2Database[categoryName];
                Object.keys(boxes).forEach(boxName => {
                    const btn = document.createElement('button');
                    btn.className = 'box-btn';
                    btn.textContent = boxName;
                    
                    btn.onclick = () => {
                        if (currentActiveButton) {
                            currentActiveButton.classList.remove('active');
                        }
                        btn.classList.add('active');
                        currentActiveButton = btn;

                        renderGuns(boxName, boxes[boxName]);
                    };
                    
                    categoryDiv.appendChild(btn);
                });

                sidebar.appendChild(categoryDiv);
            });
        }

        function renderGuns(boxName, gunsArray) {
            contentArea.innerHTML = `<h2 class="box-title">${boxName}</h2>`;
            
            const grid = document.createElement('div');
            grid.className = 'gun-grid';

            gunsArray.forEach((item, index) => {
                const gun = item.name;
                const imgSrc = item.img;
                
                const card = document.createElement('div');
                card.className = 'gun-card';
                card.style.animationDelay = `${index * 0.04}s`;
                
                const isOwned = inventory[gun] === true;
                if (isOwned) {
                    card.classList.add('owned');
                }

                card.innerHTML = `
                    <div class="gun-image-container">
                        <img src="${imgSrc}" alt="${gun}" loading="lazy" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'50\\' height=\\'50\\'><rect width=\\'50\\' height=\\'50\\' fill=\\'%232a2b33\\'/></svg>'">
                    </div>
                    <div class="gun-info">
                        <span class="gun-name">${gun}</span>
                        <span class="gun-status">${isOwned ? 'Owned' : 'Not Owned'}</span>
                    </div>
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="${gun}" ${isOwned ? 'checked' : ''}>
                        <span class="custom-checkbox"></span>
                    </div>
                `;

                card.addEventListener('click', () => {
                    const checkbox = card.querySelector('input[type="checkbox"]');
                    const statusText = card.querySelector('.gun-status');
                    
                    const newState = !checkbox.checked;
                    checkbox.checked = newState;
                    inventory[gun] = newState;
                    
                    localStorage.setItem('mm2VisualInventory', JSON.stringify(inventory));
                    
                    if (newState) {
                        card.classList.add('owned');
                        statusText.textContent = 'Owned';
                    } else {
                        card.classList.remove('owned');
                        statusText.textContent = 'Not Owned';
                    }
                    
                    updateGlobalStats();
                });

                grid.appendChild(card);
            });

            contentArea.appendChild(grid);
        }

        renderSidebar();
        updateGlobalStats();
    </script>
</body>
</html>
